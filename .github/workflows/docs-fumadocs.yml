name: Deploy Fumadocs

# Builds the Fumadocs site as a container (arm64, matching the docs box) and deploys it
# as a long-running Next.js server behind nginx at /v2. Automates the manual flow:
# build image -> push to GHCR -> box pulls + restarts the container.
#
# Consumes the committed wiki/*.md (kept current by js.yml's build-docs).
# Cutover to root: drop NEXT_BASE_PATH=/v2 in the Dockerfile + point nginx `location /`.

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'wiki/**'
      - 'website/**'
      - 'build/wiki-to-fumadocs.ts'
      - '.github/workflows/docs-fumadocs.yml'
  workflow_dispatch:

concurrency:
  group: docs-fumadocs
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.repository == 'ccxt/ccxt'
    runs-on: ubuntu-24.04-arm        # arm64 — native build matching the docs server
    env:
      IMAGE: ghcr.io/ccxt/ccxt-fumadocs
      CONTAINER: ccxt-docs
      PORT: '3005'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # committed wiki/*.md -> website/content/docs (baked into the image at build)
      - name: Convert wiki to Fumadocs content
        run: npx -y tsx build/wiki-to-fumadocs.ts

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: website
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Configure SSH (pinned host key)
        env:
          SSH_KEY: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DOCS_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Pull & restart container on the box
        env:
          HOST: ${{ secrets.DOCS_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DOCS_DEPLOY_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_deploy "${DEPLOY_USER}@${HOST}" \
            IMAGE="${IMAGE}" CONTAINER="${CONTAINER}" PORT="${PORT}" \
            GHCR_USER="${GHCR_USER}" GHCR_TOKEN="${GHCR_TOKEN}" 'bash -se' <<'EOF'
          set -e
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE:latest"
          docker rm -f "$CONTAINER" 2>/dev/null || true
          # OpenRouter key + model live only on the box (root-only env-file, never in GitHub),
          # injected here so Ask-AI survives redeploys. Site still serves if it's absent.
          ENVFILE_ARG=""
          [ -f /root/ccxt-docs.env ] && ENVFILE_ARG="--env-file /root/ccxt-docs.env"
          docker run -d --restart=always -p 127.0.0.1:${PORT}:${PORT} $ENVFILE_ARG --name "$CONTAINER" "$IMAGE:latest"
          docker image prune -f
          docker logout ghcr.io || true
          EOF
