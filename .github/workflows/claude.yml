name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is mentioned, to avoid burning tokens on every comment
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # Route Claude Code's Anthropic-native protocol through OpenRouter's
          # Anthropic-compatible endpoint. ANTHROPIC_AUTH_TOKEN makes the CLI
          # send "Authorization: Bearer <key>", which is what OpenRouter expects.
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          # The action's validator requires anthropic_api_key to be set;
          # we pass the OpenRouter key here to satisfy it. The base URL
          # override ensures requests go to OpenRouter either way.
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          # OpenRouter model slug format (anthropic/ prefix)
          claude_args: "--model anthropic/claude-fable-5 --max-turns 10"
