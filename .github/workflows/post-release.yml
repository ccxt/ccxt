name: On release published (pushback changelog)

on:
  workflow_run:
    workflows: ["Release workflow"]
    types:
      - completed
jobs:
  changelog:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Update changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 2
      - name: Generate and push changelog
        uses: rhysd/changelog-from-release/action@v3
        with:
          file: CHANGELOG.md
          github_token: ${{ secrets.GH_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Post release announcement to Telegram and Discord
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node --experimental-strip-types utils/release-announcement.ts --changelog CHANGELOG.md
  failed-release:
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip changelog update
        run: echo "Won't continue because the Release workflow failed."